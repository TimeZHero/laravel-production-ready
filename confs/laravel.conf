server {
    listen 8080;
    listen [::]:8080;
    server_name _;

    root /app/public;
    index index.php;

    charset utf-8;
    sendfile on;
    absolute_redirect off;
    error_page 404 /index.php;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    # Uncomment to allow framing from subdomains (and optionally remove X-Frame-Options):
    # add_header Content-Security-Policy "frame-ancestors 'self' *.allowed-domain.com" always;

    # Security: deny dotfiles (except .well-known for ACME/SSL)
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Static: suppress logging for common requests
    location ~* ^/(favicon\.ico|robots\.txt)$ {
        access_log off;
        log_not_found off;
    }

    # Send all requests to Laravel
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Pass to PHP-FPM
    location ~ ^/index\.php(/|$) {
        fastcgi_pass unix:/tmp/php-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Security: deny direct access to other PHP files
    location ~ \.php$ {
        return 404;
    }
}
